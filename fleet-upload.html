<!DOCTYPE html>
<html>
<head>
  <title>Upload Car</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    form { max-width: 500px; margin: auto; }
    input, textarea, button { width: 100%; padding: 10px; margin: 8px 0; }
  </style>
</head>
<body>
  <h2>Add a Car to Your Fleet</h2>
  <form>
    <input type="text" placeholder="Car Model" required>
    <input type="text" placeholder="Year" required>
    <input type="number" placeholder="Price per Day (€)" required>
    <textarea placeholder="Description"></textarea>
    <input type="file" accept="image/*" multiple>
    <button type="submit">Upload Car</button>
  </form>
</body>
</html>
